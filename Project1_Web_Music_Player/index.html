<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    
    <div class="player">
        <!-- Album Art -->
        <div class="album-art-container">
            <img id="cover" src="assets/images/cover.jpg" alt="Album Cover">
        </div>
        
        <!-- Song Info -->
        <div class="song-info">
            <h2 id="title">Select a Song</h2>
            <p id="artist">-</p>
        </div>
        
        <!-- Progress Bar -->
        <div class="progress-container">
            <span id="currentTime">0:00</span>
            <input type="range" id="progress" min="0" max="100" value="0">
            <span id="duration">0:00</span>
        </div>
        
        <!-- Controls -->
        <div class="controls">
            <button id="previous" class="control-btn" aria-label="Previous Song">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                </svg>
            </button>
            <button id="playPause" class="control-btn play-btn" aria-label="Play/Pause">
                <svg id="playIcon" viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" width="32" height="32" fill="currentColor" style="display: none;">
                    <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                </svg>
            </button>
            <button id="next" class="control-btn" aria-label="Next Song">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                </svg>
            </button>
        </div>
        
        <!-- Volume Control -->
        <div class="volume-container">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
        </div>
        
        <!-- Playlist -->
        <div class="playlist-container">
            <h3 class="playlist-title">Playlist</h3>
            <ul id="playlist"></ul>
        </div>
    </div>
    
    <!-- Audio Element -->
    <audio id="audioPlayer"></audio>
    
    <script src="script.js"></script>
</body>
</html>
